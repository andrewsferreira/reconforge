# ReconForge MCP server configuration.
#
# See docs/CLAUDE_MCP_INTEGRATION.md for setup and
# docs/CLAUDE_MCP_IMPLEMENTATION_PLAN.md for the execution-tier policy
# model this file's settings gate.

mcp:
  # Server-wide off switch for INTRUSIVE-tier execution
  # (reconforge/mcp/policy.py's SAFE_READ_ONLY -> PROHIBITED taxonomy;
  # today that's web's "exploit" phase and api's "authorization" phase).
  #
  # This is an *additional* gate on top of every per-request requirement
  # (active engagement, validated scope, explicit_confirmation,
  # approval_id) -- meeting all of those still isn't enough for an
  # INTRUSIVE-tier phase unless this is also true. It exists because a
  # single fully-authorized MCP request is a per-target decision an
  # operator can make in the moment; enabling INTRUSIVE execution at all
  # is a standing, server-wide posture change an operator should make
  # deliberately by editing this file, not something any one MCP request
  # should be able to talk its way into. Not settable via the MCP request
  # itself -- only editing this file changes it.
  #
  # Off by default.
  allow_intrusive_execution: false

  # Where out-of-band approval requests (reconforge/mcp/approvals.py) are
  # persisted as JSON files. reconforge_request_execution (MCP) only ever
  # creates a request here in "awaiting_operator_approval" state; moving
  # it to "approved" requires a human running
  # `reconforge mcp approvals approve <request_id>` in a separate,
  # out-of-band CLI invocation -- there is no MCP tool that can write to
  # this directory. Relative paths resolve against the process's current
  # working directory, matching --output-base's existing behavior
  # elsewhere in this project.
  approvals_dir: ".reconforge/mcp_approvals"

  # How long a pending request waits for operator action before it's
  # treated as expired -- checked both when an operator tries to approve
  # it and, independently, when the MCP layer tries to consume an
  # already-approved one (an approval granted just before expiry can
  # still expire before it's ever used).
  approval_ttl_minutes: 30
