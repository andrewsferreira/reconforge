name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --follow-imports=skip --ignore-missing-imports reconforge.py core/runner.py core/workflow_orchestrator.py

      - name: Security scan (bandit)
        run: bandit -r core modules reconforge.py -c pyproject.toml

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: Tests with coverage gate
        run: pytest --cov=core --cov=modules --cov-report=term-missing --cov-fail-under=85

      - name: Packaging smoke test
        run: |
          python -m pip install -e . --no-build-isolation
          reconforge --help > /dev/null
