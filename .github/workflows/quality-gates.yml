name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history, required by the secret-scan step below

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_COMMENTS: false

      - name: Lint (ruff)
        run: ruff check .

      - name: Documentation link check
        run: python scripts/check_doc_links.py

      - name: Type check (mypy)
        run: mypy --follow-imports=skip --ignore-missing-imports core modules reconforge mcp_validation scripts

      - name: Security scan (bandit)
        run: bandit -r core modules reconforge mcp_validation scripts -c pyproject.toml

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: Tests with coverage gate
        run: pytest --cov=core --cov=modules --cov=reconforge --cov-report=term-missing

      - name: Packaging smoke test
        run: |
          reconforge --help > /dev/null
          python -m reconforge --help > /dev/null
